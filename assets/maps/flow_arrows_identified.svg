<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1916" viewBox="0 0 1700 1916" role="img" aria-label="Bounded Vijayawada river and canal flow arrows, including upper and lower Krishna branches">
  <defs>

    <marker id="head-river" markerUnits="userSpaceOnUse" viewBox="0 0 28 28"
      refX="25" refY="14" markerWidth="28" markerHeight="28" orient="auto">
      <path d="M3 3 L25 14 L3 25 L8.2 14 Z" fill="#0369a1" stroke="#ffffff" stroke-width="2.6" stroke-linejoin="round"/>
    </marker>

    <marker id="head-canal" markerUnits="userSpaceOnUse" viewBox="0 0 28 28"
      refX="25" refY="14" markerWidth="28" markerHeight="28" orient="auto">
      <path d="M3 3 L25 14 L3 25 L8.2 14 Z" fill="#b45309" stroke="#ffffff" stroke-width="2.6" stroke-linejoin="round"/>
    </marker>

    <marker id="head-budameru" markerUnits="userSpaceOnUse" viewBox="0 0 28 28"
      refX="25" refY="14" markerWidth="28" markerHeight="28" orient="auto">
      <path d="M3 3 L25 14 L3 25 L8.2 14 Z" fill="#0f766e" stroke="#ffffff" stroke-width="2.6" stroke-linejoin="round"/>
    </marker>

    <marker id="head-major" markerUnits="userSpaceOnUse" viewBox="0 0 28 28"
      refX="25" refY="14" markerWidth="28" markerHeight="28" orient="auto">
      <path d="M3 3 L25 14 L3 25 L8.2 14 Z" fill="#92400e" stroke="#ffffff" stroke-width="2.6" stroke-linejoin="round"/>
    </marker>
    <style>
      .arrow-halo {
        fill: none;
        stroke: #ffffff;
        stroke-width: 15;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0.96;
      }
      .arrow-shadow {
        fill: none;
        stroke: #020617;
        stroke-width: 10;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0.20;
      }
      .arrow-shaft {
        fill: none;
        stroke-width: 7.2;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0.98;
      }
      .river .arrow-shaft,
      .upper-branch .arrow-shaft,
      .lower-branch .arrow-shaft,
      .main-branch .arrow-shaft {
        stroke-width: 8.2;
      }
      .flow-label {
        font-family: Inter, Arial, Helvetica, sans-serif;
        font-weight: 800;
        font-size: 21px;
        letter-spacing: 0;
      }
      .halo-label {
        fill: none;
        stroke: #ffffff;
        stroke-width: 6px;
        stroke-linejoin: round;
        paint-order: stroke;
        opacity: 0.96;
      }
      .fill-label {
        fill: #075985;
        stroke: none;
      }
    </style>
  </defs>
  <rect width="1700" height="1916" fill="none"/>
  <g id="flow-direction-arrows" data-source="bounded_operational_canvas" data-feature-count="17">

    <g class="major-flow-arrow river upper-branch" data-arrow-id="KR-UP-01" data-name="Krishna upper/northern branch">
