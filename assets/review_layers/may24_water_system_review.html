<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vijayawada May 24 Hydro-Network Review</title>
  <link rel="stylesheet" href="../vendor/leaflet/leaflet.css">
  <style>
    :root {
      --ink: #14212b;
      --muted: #50606d;
      --line: rgba(20, 33, 43, 0.16);
      --panel: rgba(255, 255, 255, 0.96);
      --water: #2563eb;
      --canal: #0e7490;
      --arrow: #b45309;
      --pump: #ea580c;
      --outfall: #dc2626;
    }
    html, body, #map {
      height: 100%;
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: #e7edf0;
    }
    #map {
      min-height: 520px;
      background:
        linear-gradient(0deg, rgba(15, 23, 42, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(15, 23, 42, 0.025) 1px, transparent 1px),
        #e7edf0;
      background-size: 28px 28px;
    }
    .leaflet-container {
      font-family: inherit;
      background: transparent;
    }
    .leaflet-top.leaflet-left {
      top: 10px;
      left: 10px;
    }
    .leaflet-bottom.leaflet-right {
      bottom: 12px;
      right: 12px;
    }
    .leaflet-control-zoom {
      border: 1px solid var(--line) !important;
      border-radius: 7px !important;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.12) !important;
      overflow: hidden;
    }
    .leaflet-control-layers {
      max-height: calc(100vh - 42px);
      max-width: min(360px, calc(100vw - 24px));
      overflow: auto;
      border: 1px solid var(--line) !important;
      border-radius: 7px !important;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.14) !important;
      color: #1f2f3b;
      font-size: 12px;
    }
    .leaflet-control-layers-expanded {
      padding: 9px 10px;
    }
    .leaflet-control-layers-selector {
      margin-right: 5px;
    }
    .leaflet-popup-content {
      margin: 10px 12px;
      min-width: 230px;
      max-width: 360px;
    }
    .review-panel {
      position: absolute;
      z-index: 800;
      top: 12px;
      left: 56px;
      width: min(430px, calc(100vw - 450px));
      padding: 10px 12px 11px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.16);
    }
    .review-panel h1 {
      margin: 0 0 5px;
      font-size: 16px;
      line-height: 1.18;
      letter-spacing: 0;
    }
    .review-panel p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.38;
    }
    .review-stats {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .review-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 25px;
      padding: 4px 7px;
      border: 1px solid #d5dde5;
      border-radius: 999px;
      background: #fff;
      color: #273744;
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }
    .review-pill::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--arrow);
    }
    .coordinate-readout {
      position: absolute;
      z-index: 800;
      left: 14px;
      bottom: 14px;
      padding: 7px 9px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 7px;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.12);
      font-size: 12px;
      color: #31414d;
    }
    .popup-title {
      font-weight: 850;
      margin-bottom: 7px;
      color: #14212b;
    }
    .popup-row {
      display: grid;
      grid-template-columns: 106px minmax(0, 1fr);
      gap: 8px;
      padding: 3px 0;
      font-size: 12px;
      border-top: 1px solid #edf2f6;
    }
    .popup-key {
      color: #667584;
      overflow-wrap: anywhere;
    }
    .popup-value {
      color: #14212b;
      overflow-wrap: anywhere;
    }
    .flow-arrowhead-icon {
      background: transparent;
      border: 0;
    }
    .flow-arrowhead {
      display: block;
      width: 0;
      height: 0;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      border-left: 20px solid var(--arrow);
      filter: drop-shadow(0 0 2px #fff) drop-shadow(0 1px 2px rgba(15, 23, 42, 0.35));
      transform: rotate(var(--angle));
      transform-origin: 10px 8px;
    }
    @media (max-width: 920px) {
      .review-panel {
        left: 48px;
        right: 10px;
        width: auto;
      }
      .leaflet-top.leaflet-right {
        top: auto;
        bottom: 12px;
        right: 12px;
      }
      .leaflet-control-layers {
        max-height: 38vh;
      }
      .coordinate-readout {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="map" aria-label="Vijayawada May 24 hydro-network review map"></div>
  <section class="review-panel" aria-label="Review map summary">
    <h1>May 24 Reviewed Hydro-Network Overview</h1>
    <p>Reviewed Krishna branches, Budameru, major canals, flow-direction arrows, pumps, outfalls and control sections.</p>
    <div class="review-stats" id="review-stats">
      <span class="review-pill">Loading layers</span>
    </div>
  </section>
  <div class="coordinate-readout" id="coordinate-readout">Lat/Lon</div>

  <script src="../vendor/leaflet/leaflet.js"></script>
  <script src="metadata.js"></script>
  <script src="layers/municipal_boundary.js"></script>
  <script src="layers/revenue_wards.js"></script>
  <script src="layers/budameru_canal.js"></script>
  <script src="layers/krishna_river_osm_water.js"></script>
  <script src="layers/reservoir.js"></script>
  <script src="layers/major_canals_osm.js"></script>
  <script src="layers/waterbody_flow_direction_arrows.js"></script>
  <script src="layers/pump_receiving_waterbody_connectors.js"></script>
  <script src="layers/pump_drain_link_connectors.js"></script>
  <script src="layers/drainage_pump_stations.js"></script>
  <script src="layers/candidate_outfalls.js"></script>
  <script src="layers/control_sections.js"></script>
  <script>
    const reviewLayers = window.VJ_BASEMAP_REVIEW_LAYERS || {};
    const layerMeta = Object.assign({}, window.VJ_BASEMAP_REVIEW_META || {}, {
      municipal_boundary: {
        key: "municipal_boundary",
        label: "Municipal Boundary",
        color: "#111827",
        geometry: "polygon",
        weight: 3,
        fillOpacity: 0.015,
        featureCount: 1
      },
      revenue_wards: {
        key: "revenue_wards",
        label: "Revenue Wards",
        color: "#64748b",
        geometry: "polygon",
        weight: 1.1,
        fillOpacity: 0.025,
        featureCount: 71
      },
      budameru_canal: {
        key: "budameru_canal",
        label: "Budameru Canal",
        color: "#0891b2",
        geometry: "polygon",
        weight: 2,
        fillOpacity: 0.38,
        featureCount: 1
      },
      krishna_river_osm_water: {
        key: "krishna_river_osm_water",
        label: "Krishna River OSM Water",
        color: "#2563eb",
        geometry: "polygon",
        weight: 2,
        fillOpacity: 0.34,
        featureCount: 3
      },
      reservoir: {
        key: "reservoir",
        label: "Reservoir / Prakasam Backwater",
        color: "#38bdf8",
        geometry: "polygon",
        weight: 2,
        fillOpacity: 0.35,
        featureCount: 1
      },
      major_canals_osm: {
        key: "major_canals_osm",
        label: "OSM Major Canals / Offtakes",
        color: "#0e7490",
        geometry: "line",
        weight: 3.2,
        fillOpacity: 0.18,
        featureCount: 7
      },
      waterbody_flow_direction_arrows: {
        key: "waterbody_flow_direction_arrows",
        label: "Waterbody Flow Direction Arrows",
        color: "#b45309",
        geometry: "line",
        weight: 3.5,
        fillOpacity: 0.18,
        featureCount: 22
      },
      pump_receiving_waterbody_connectors: {
        key: "pump_receiving_waterbody_connectors",
        label: "Pump To Receiving Water",
        color: "#e11d48",
        geometry: "line",
        weight: 2.5,
        fillOpacity: 0.18,
        featureCount: 13,
        dashArray: "8 6"
      },
      pump_drain_link_connectors: {
        key: "pump_drain_link_connectors",
        label: "Pump To Referenced Drain",
        color: "#7c2d12",
        geometry: "line",
        weight: 1.5,
        fillOpacity: 0.18,
        featureCount: 26
      },
      drainage_pump_stations: {
        key: "drainage_pump_stations",
        label: "Drainage Pump Stations",
        color: "#ea580c",
        geometry: "point",
        weight: 1,
        fillOpacity: 0.86,
        featureCount: 13
      },
      candidate_outfalls: {
        key: "candidate_outfalls",
        label: "Candidate Outfalls",
        color: "#dc2626",
        geometry: "point",
        weight: 1,
        fillOpacity: 0.72,
        featureCount: 565
      },
      control_sections: {
        key: "control_sections",
        label: "Control Sections",
        color: "#f59e0b",
        geometry: "line",
        weight: 4,
        fillOpacity: 0.18,
        featureCount: 12
      }
    });
    const layerOrder = [
      "municipal_boundary",
      "revenue_wards",
      "budameru_canal",
      "krishna_river_osm_water",
      "reservoir",
      "major_canals_osm",
      "waterbody_flow_direction_arrows",
      "pump_receiving_waterbody_connectors",
      "pump_drain_link_connectors",
      "drainage_pump_stations",
      "candidate_outfalls",
      "control_sections"
    ];
    const defaultVisible = new Set([
      "municipal_boundary",
      "revenue_wards",
      "budameru_canal",
      "krishna_river_osm_water",
      "reservoir",
      "major_canals_osm",
      "waterbody_flow_direction_arrows",
      "pump_receiving_waterbody_connectors",
      "drainage_pump_stations",
      "candidate_outfalls",
      "control_sections"
    ]);
    const map = L.map("map", {
      preferCanvas: true,
      zoomControl: false,
      layers: []
    });
    L.control.zoom({ position: "bottomright" }).addTo(map);

    const blankBase = L.layerGroup().addTo(map);
    const baseMaps = {
      "Clean vector canvas": blankBase,
      "OpenStreetMap": L.tileLayer(
        "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
        { maxZoom: 19, attribution: "&copy; OpenStreetMap contributors" }
      ),
      "Carto Light": L.tileLayer(
        "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
        { maxZoom: 20, attribution: "&copy; OpenStreetMap contributors &copy; CARTO" }
      ),
      "Esri World Imagery": L.tileLayer(
        "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
        { maxZoom: 19, attribution: "Tiles &copy; Esri, Maxar, Earthstar Geographics, GIS User Community" }
      )
    };
    const overlayLayers = {};
    const visibleBounds = L.latLngBounds([]);
    let loadedLayerCount = 0;
    let loadedFeatureCount = 0;

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, function(char) {
        return {"&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;"}[char];
      });
    }

    function numeric(value, digits) {
      const number = Number(value);
      if (!Number.isFinite(number)) return value;
      return number.toLocaleString(undefined, { maximumFractionDigits: digits });
    }

    function popupHtml(feature, meta) {
      const props = feature.properties || {};
      const rows = Object.keys(props)
        .filter((key) => props[key] !== null && props[key] !== undefined && props[key] !== "")
        .filter((key) => key !== "_layer_label")
        .slice(0, 18)
        .map((key) => {
          const value = typeof props[key] === "number" ? numeric(props[key], 3) : props[key];
          return `<div class="popup-row"><div class="popup-key">${escapeHtml(key)}</div><div class="popup-value">${escapeHtml(value)}</div></div>`;
        })
        .join("");
      return `<div class="popup-title">${escapeHtml(meta.label)}</div>${rows}`;
    }

    function styleFor(meta) {
      return {
        color: meta.color,
        weight: meta.weight,
        opacity: meta.key === "waterbody_flow_direction_arrows" ? 0.96 : 0.88,
        fillColor: meta.color,
        fillOpacity: meta.geometry === "polygon" ? meta.fillOpacity : 0,
        dashArray: meta.dashArray || null,
        lineCap: "round",
        lineJoin: "round"
      };
    }

    function pointFor(meta, feature, latlng) {
      const props = feature.properties || {};
      let radius = meta.key === "candidate_outfalls" ? 4.2 : 4.8;
      let fillColor = meta.color;
      let strokeColor = "#ffffff";
      let weight = 1.1;
      if (meta.key === "drainage_pump_stations") {
        const cap = Number(props.DPS_CAP || props.capacity || 0);
        radius = Math.max(5, Math.min(13, 5 + Math.sqrt(Math.max(cap, 0)) * 0.58));
        fillColor = cap > 0 ? "#ea580c" : "#9ca3af";
        strokeColor = cap > 0 ? "#ffffff" : "#475569";
        weight = 1.2;
      }
      return L.circleMarker(latlng, {
        radius,
        color: strokeColor,
        weight,
        opacity: 0.96,
        fillColor,
        fillOpacity: meta.fillOpacity || 0.86
      });
    }

    function lineCoordinateSets(geometry) {
      if (!geometry) return [];
      if (geometry.type === "LineString") return [geometry.coordinates];
      if (geometry.type === "MultiLineString") return geometry.coordinates;
      if (geometry.type === "GeometryCollection") {
        return geometry.geometries.flatMap((item) => lineCoordinateSets(item));
      }
      return [];
    }

    function bearingDegrees(start, end) {
      const lat1 = start[1] * Math.PI / 180;
      const lat2 = end[1] * Math.PI / 180;
      const dLon = (end[0] - start[0]) * Math.PI / 180;
      const y = Math.sin(dLon) * Math.cos(lat2);
      const x = Math.cos(lat1) * Math.sin(lat2) -
        Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
      return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
    }

    function flowArrowMarker(feature) {
      const sets = lineCoordinateSets(feature.geometry);
      if (!sets.length) return null;
      const coords = sets.reduce((best, item) => item.length > best.length ? item : best, []);
      if (coords.length < 2) return null;
      const start = coords[coords.length - 2];
      const end = coords[coords.length - 1];
      const angle = bearingDegrees(start, end) - 90;
      return L.marker([end[1], end[0]], {
        interactive: false,
        icon: L.divIcon({
          className: "flow-arrowhead-icon",
          html: `<span class="flow-arrowhead" style="--angle:${angle}deg"></span>`,
          iconSize: [30, 30],
          iconAnchor: [15, 15]
        })
      });
    }

    function addFlowArrowDecorations(layer, geojson) {
      if (!geojson || !Array.isArray(geojson.features)) return;
      for (const feature of geojson.features) {
        const marker = flowArrowMarker(feature);
        if (marker) layer.addLayer(marker);
      }
    }

    for (const key of layerOrder) {
      const geojson = reviewLayers[key];
      const meta = layerMeta[key];
      if (!geojson || !meta) continue;
      loadedLayerCount += 1;
      loadedFeatureCount += Array.isArray(geojson.features) ? geojson.features.length : 0;
      const layer = L.geoJSON(geojson, {
        style: () => styleFor(meta),
        pointToLayer: (feature, latlng) => pointFor(meta, feature, latlng),
        onEachFeature: (feature, itemLayer) => {
          itemLayer.bindPopup(popupHtml(feature, meta), { maxHeight: 340 });
          const props = feature.properties || {};
          const name = props.feature_name || props.source_name || props.name || props.WARD_NAME || props.arrow_id;
          if (name && (meta.key === "waterbody_flow_direction_arrows" || meta.geometry === "point")) {
            itemLayer.bindTooltip(String(name), { sticky: true, direction: "top", opacity: 0.92 });
          }
        }
      });
      if (key === "waterbody_flow_direction_arrows") {
        addFlowArrowDecorations(layer, geojson);
      }
      const label = `${meta.label} (${Number(meta.featureCount || geojson.features?.length || 0).toLocaleString()})`;
      overlayLayers[label] = layer;
      if (defaultVisible.has(key)) {
        layer.addTo(map);
        const bounds = layer.getBounds && layer.getBounds();
        if (bounds && bounds.isValid()) visibleBounds.extend(bounds);
      }
    }

    L.control.layers(baseMaps, overlayLayers, { collapsed: false, position: "topright" }).addTo(map);
    if (visibleBounds.isValid()) {
      map.fitBounds(visibleBounds, { padding: [34, 34] });
    } else {
      map.setView([16.5062, 80.6480], 12);
    }

    const stats = document.getElementById("review-stats");
    stats.innerHTML = [
      `${loadedLayerCount} layers`,
      `${loadedFeatureCount.toLocaleString()} features`,
      `${Number(layerMeta.waterbody_flow_direction_arrows.featureCount).toLocaleString()} flow arrows`
    ].map((item) => `<span class="review-pill">${escapeHtml(item)}</span>`).join("");

    const readout = document.getElementById("coordinate-readout");
    map.on("mousemove", (event) => {
      readout.textContent = `${event.latlng.lat.toFixed(6)}, ${event.latlng.lng.toFixed(6)}`;
    });
    map.on("click", (event) => {
      readout.textContent = `${event.latlng.lat.toFixed(6)}, ${event.latlng.lng.toFixed(6)}`;
    });
    setTimeout(() => map.invalidateSize(), 250);
  </script>
</body>
</html>
